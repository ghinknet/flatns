# flatns example configuration.
#
# Copy this file to config.yaml (read from the working directory). Send SIGHUP
# (kill -HUP <pid>) to reload it at runtime.

# Logging. A human-readable console stream is always written to stdout. When a
# file path is set, structured JSON logs are written with lumberjack rotation:
# `all` captures everything at the active level, `err` captures Warn and above.
log:
  debug: false              # true => debug level, false => info level
  file:
    all: "logs/app.log"     # combined log file; empty disables this sink
    err: "logs/err.log"     # error-only log file; empty disables this sink
  max_size: 5               # rotate after this many megabytes
  max_backups: 100          # keep at most this many rotated files
  max_age: 30               # delete rotated files older than this many days
  compress: true            # gzip rotated files

# Deployment identifier embedded in every managed record's remark
# (flatns-managed:i=<instance>:<source>). Set a unique value per deployment when
# running several flatns instances that flatten the SAME source but each manage
# a different subset of IPs -- e.g. one host per region pinned to its local
# nodes. Each instance then only ever touches its own records and never clobbers
# another's. Leave empty for a single deployment (legacy remark format).
# Per-entry `instance` overrides this global default.
instance: ""

# Global recursive DNS servers used to resolve the CNAME chain. Leave empty to
# use the operating system resolver. Each entry is host or host:port (port
# defaults to 53). These improve reliability and let you bypass a flaky local
# resolver. Individual flatten entries may override this list.
resolvers:
  - 1.1.1.1
  - 8.8.8.8
  - 223.5.5.5:53

# Provider credentials, keyed by an arbitrary alias you choose. Flatten entries
# reference a provider by this alias so one account can serve many entries.
providers:
  my-tencent:
    type: tencent          # registered provider implementation
    secret_id: "TENCENT_SECRET_ID"
    secret_key: "TENCENT_SECRET_KEY"
    region: ""             # optional; DNSPod is global

  my-aliyun:
    type: aliyun
    secret_id: "ALIYUN_ACCESS_KEY_ID"
    secret_key: "ALIYUN_ACCESS_KEY_SECRET"
    region: cn-hangzhou    # optional; defaults to cn-hangzhou

# Flatten jobs. Each entry runs in its own goroutine and reconciles the target
# subdomain's records with the addresses behind `source`.
flattens:
  - name: example-apex          # friendly name used in logs
    provider: my-tencent        # alias from `providers` above
    source: example.cn.eo.dnse1.com  # the CNAME to flatten
    domain: example.cn          # target registrable zone
    sub_domain: "@"             # target host; "@" is the apex
    ttl: 600                    # TTL for managed records, seconds
    interval: 5m                # polling interval (e.g. 30s, 5m, 1h)
    ipv6: false                 # also manage AAAA records
    # instance: "beijing"       # optional per-entry override of global instance
    # resolvers:                # optional per-entry resolver override
    #   - 9.9.9.9

  - name: www-on-aliyun
    provider: my-aliyun
    source: example.com.cdn.example-cdn.net
    domain: example.com
    sub_domain: www
    ttl: 300
    interval: 2m
    ipv6: true
