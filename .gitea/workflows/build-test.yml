name: Build Test

on:
  push:
    branches:
      - main

env:
  APP_NAME: FlatNS

jobs:
  build-test:
    if: github.ref == 'refs/heads/main'
    runs-on: node-24-alpine

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        shell: sh
        run: |
          set -e
          sed -i 's#https\?://dl-cdn.alpinelinux.org/alpine#https://mirrors.aliyun.com/alpine#g' /etc/apk/repositories
          apk update
          apk add --no-cache git ca-certificates curl tar xz

      - name: Get Go version from go.mod
        id: get_go_version
        shell: sh
        run: |
          set -e
          go_version=$(awk '/^go /{print $2; exit}' go.mod || true)
          if [ -z "$go_version" ]; then
            echo "No 'go' directive found in go.mod, defaulting to 1.25"
            go_version=1.25
          fi
          echo "Detected go version: $go_version"
          echo "go-version=$go_version" >> $GITHUB_OUTPUT

      - name: Install Go
        shell: sh
        run: |
          set -e
          
          go_version="${{ steps.get_go_version.outputs.go-version }}"
          
          if command -v go >/dev/null 2>&1; then
            current_go=$(go version | awk '{print $3}' | sed 's/^go//')
          else
            current_go=""
          fi

          version_ge() {
            awk -v a="$1" -v b="$2" 'BEGIN{
              split(a, A, "."); split(b, B, ".");
              for (i=1; i<=3; i++) {
                ai = (i in A) ? A[i] : 0;
                bi = (i in B) ? B[i] : 0;
                if (ai+0 > bi+0) exit 0;
                if (ai+0 < bi+0) exit 1;
              }
              exit 0;
            }'
          }

          need_install=0
          if [ -z "$current_go" ]; then
            need_install=1
          else
            if ! version_ge "$current_go" "$go_version"; then
              need_install=1
            fi
          fi

          if [ "$need_install" -eq 1 ]; then
            echo "Installing Go $go_version because current is '$current_go'"
            arch=$(uname -m)
            case "$arch" in
              x86_64|amd64) goarch="amd64" ;;
              aarch64|arm64) goarch="arm64" ;;
              *) goarch="amd64" ;;
            esac
            url="https://mirrors.aliyun.com/golang/go${go_version}.linux-${goarch}.tar.gz"
            echo "Downloading: $url"
            curl -fsSL -o /tmp/go.tgz "$url"
            rm -rf /usr/local/go || true
            tar -C /usr/local -xzf /tmp/go.tgz
            export PATH=/usr/local/go/bin:$PATH
            echo "Installed: $(go version)"
          else
            echo "Existing go is sufficient: $current_go >= $go_version"
          fi

      - name: Go test
        shell: sh
        run: |
          set -e
          export PATH=/usr/local/go/bin:$PATH
          export GOPROXY=https://goproxy.cn,direct
          export GOSUMDB=off
          # Placeholders for embed targets required by tests.
          : > decomp_src
          : > go_sdk
          go test ./...

      - name: Build Go application
        shell: sh
        run: |
          set -e
          export PATH=/usr/local/go/bin:$PATH
          export GOPROXY=https://goproxy.cn,direct
          export GOSUMDB=off
          echo "Building Go application for linux/amd64..."
          go mod download
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -trimpath -o ${{ env.APP_NAME }}
          
          if [ -f "${{ env.APP_NAME }}" ]; then
            echo "Binary size: $(du -h ${{ env.APP_NAME }} | cut -f1)"
            echo "✅ Build successful"
          else
            echo "Binary build failed!"
            exit 1
          fi
